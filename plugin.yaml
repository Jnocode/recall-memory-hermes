name: recall-memory-hermes
version: 0.2.0
description: "Hermes Agent memory provider for recall-sqlite (SAG-based, tiered storage)"
author: Jun
license: Apache-2.0

memory:
  provider: recall
  entry_point: :register

config:
  db_path:
    type: string
    default: ""
    description: "Path to recall DB (auto-detect if empty)"
  embed_url:
    type: string
    default: "http://127.0.0.1:1234"
    description: "LM Studio embedding endpoint"
  fallback_honcho:
    type: bool
    default: false
    description: "Fallback to Honcho if recall returns <3 results"
  fallback_honcho_url:
    type: string
    default: "http://localhost:8082"
    description: "Honcho API base URL"
